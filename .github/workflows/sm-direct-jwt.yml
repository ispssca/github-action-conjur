name: sm-direct-jwt

# Controls when the workflow will trigger
on:
  workflow_dispatch:
  # Triggers the workflow on push events but only for the "main" branch
  # push:
  #   branches: [ "main" ]

env:
  CONJUR_AUTHENTICATE_URL: "${{ vars.SM_URL }}/authn-jwt/${{ vars.SM_JWT_AUTHN_ID }}/${{ vars.SM_ACCOUNT }}/authenticate"
  CONJUR_RETRIEVE_URL: "${{ vars.SM_URL }}/secrets/${{ vars.SM_ACCOUNT }}/variable"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: "Show configured inputs"
        run: |
          echo "vars.SM_URL: ${{ vars.SM_URL }}"
          echo "vars.SM_ACCOUNT: ${{ vars.SM_ACCOUNT }}"
          echo "vars.SM_JWT_AUTHN_ID: ${{ vars.SM_JWT_AUTHN_ID }}"
          echo "vars.SM_SECRET_ID_1: ${{ vars.SM_SECRET_ID_1 }}"
          echo "vars.SM_SECRET_ID_2: ${{ vars.SM_SECRET_ID_2 }}"

      - name: "Prepare demo artifacts"
        run: |
          printf 'JWT not captured.\n' > /tmp/action.jwt
          : > /tmp/output.txt

      - name: "Get OIDC request metadata"
        uses: actions/github-script@v8
        id: script
        timeout-minutes: 1
        with:
          debug: true
          script: |
            const token = process.env['ACTIONS_RUNTIME_TOKEN']
            const runtimeUrl = process.env['ACTIONS_ID_TOKEN_REQUEST_URL']
            core.setOutput('TOKEN', token.trim())
            core.setOutput('IDTOKENURL', runtimeUrl.trim())

      - name: "Request GitHub OIDC JWT"
        run: |
          export JWT=$(curl -H "Authorization: bearer  ${{steps.script.outputs.TOKEN}}" ${{steps.script.outputs.IDTOKENURL}}  -H "Accept: application/json; api-version=2.0" -H "Content-Type: application/json" -d "{}" | jq -r '.value')
          echo "JWT=$JWT" >> "$GITHUB_ENV"
          printf '%s\n' "$JWT" > /tmp/action.jwt

      - name: "Upload JWT Artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: actions.jwt
          path: /tmp/action.jwt
          retention-days: 90
          archive: false

      - name: "Authenticate to Secrets Manager"
        run: |
          echo "Authenticating with JWT to Conjur: $CONJUR_AUTHENTICATE_URL"
          echo ""
          export SESSION_TOKEN=$(curl -k -X POST $CONJUR_AUTHENTICATE_URL -H "Content-Type:application/x-www-form-urlencoded" -H "Accept-Encoding:base64" --data-urlencode "jwt=$JWT")
          echo "SESSION_TOKEN=$SESSION_TOKEN" >> "$GITHUB_ENV"

      - name: "Fetch secret 1"
        run: |
          echo "Retrieving secret: $CONJUR_RETRIEVE_URL/${{ vars.SM_SECRET_ID_1 }}"
          export SECRET_1=$(curl -k -H "Authorization:Token token=\"${SESSION_TOKEN}\"" $CONJUR_RETRIEVE_URL/${{ vars.SM_SECRET_ID_1 }})
          echo "SECRET_1=$SECRET_1" >> "$GITHUB_ENV"

      - name: "Fetch secret 2"
        run: |
          echo "Retrieving secret: $CONJUR_RETRIEVE_URL/${{ vars.SM_SECRET_ID_2 }}"
          export SECRET_2=$(curl -k -H "Authorization:Token token=\"${SESSION_TOKEN}\"" $CONJUR_RETRIEVE_URL/${{ vars.SM_SECRET_ID_2 }})
          echo "SECRET_2=$SECRET_2" >> "$GITHUB_ENV"

      - name: "Write demo artifact"
        if: always()
        run: |
          {
            echo "flow: github-oidc -> secrets-manager-authenticate -> secret-1 -> secret-2"
            echo "vars.SM_URL: ${{ vars.SM_URL }}"
            echo "vars.SM_ACCOUNT: ${{ vars.SM_ACCOUNT }}"
            echo "vars.SM_JWT_AUTHN_ID: ${{ vars.SM_JWT_AUTHN_ID }}"
            echo "vars.SM_SECRET_ID_1: ${{ vars.SM_SECRET_ID_1 }}"
            echo "vars.SM_SECRET_ID_2: ${{ vars.SM_SECRET_ID_2 }}"
            echo "env vars produced: SECRET_1, SECRET_2"
            echo ""
            echo "masked values follow from the runner environment:"
            echo "SECRET_1: $SECRET_1"
            echo "SECRET_2: $SECRET_2"
          } >> /tmp/output.txt

      - name: "Write job summary"
        if: always()
        run: |
          {
            echo "## Demo Summary"
            echo ""
            echo "- Auth source: GitHub OIDC JWT"
            echo "- Secrets Manager path: direct REST API"
            echo "- Requested variables: \`${{ vars.SM_SECRET_ID_1 }}\`, \`${{ vars.SM_SECRET_ID_2 }}\`"
            echo "- Environment variables created: \`SECRET_1\`, \`SECRET_2\`"
            echo "- Artifacts: \`actions.jwt\`, \`output.txt\`"
            echo "- Job status: \`${{ job.status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Upload Output Artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: output.txt
          path: /tmp/output.txt
          retention-days: 90
          archive: false
